<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:th-fragment="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <span class="brand-dot">&lt;</span>Chethan B S<span class="brand-dot">/&gt;</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"
                       th:classappend="${activePage == 'home'} ? 'active' : ''">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/about}"
                       th:classappend="${activePage == 'about'} ? 'active' : ''">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/projects}"
                       th:classappend="${activePage == 'projects'} ? 'active' : ''">Projects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/skills}"
                       th:classappend="${activePage == 'skills'} ? 'active' : ''">Skills</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contact}"
                       th:classappend="${activePage == 'contact'} ? 'active' : ''">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="footer py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-1 text-muted">
            <span class="brand-dot">&lt;</span>Chethan B S<span class="brand-dot">/&gt;</span>
        </p>
        <p class="mb-0 small text-muted">Engineer by profession, problem-solver by nature &mdash; &copy; 2026</p>
        <div class="mt-2">
            <a href="https://linkedin.com/in/chethan-b-s-769920175" target="_blank" class="social-link me-3"><i class="bi bi-linkedin"></i></a>
            <a href="https://medium.com/@chethanbs21" target="_blank" class="social-link me-3"><i class="bi bi-medium"></i></a>
            <a href="mailto:chethanchethu1159@gmail.com" class="social-link"><i class="bi bi-envelope-fill"></i></a>
        </div>
    </div>
</footer>

</html>
